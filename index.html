<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЮШКА</title>
    <link rel="icon" type="image/svg+xml" href="/yushka-logo.svg" />
    <link rel="apple-touch-icon" href="/yushka-logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЮШКА">
    <meta name="theme-color" content="#d63031">
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neucha&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Desktop Background Soup Images -->
    <div class="desktop-soup-bg" id="desktop-soup-bg"></div>

    <!-- Hidden Side Menu -->
    <div class="side-menu" id="side-menu">
      <div class="menu-content">
        <button class="close-menu-btn" id="close-menu-btn" aria-label="Close">X</button>
        <h2 class="menu-title">НАЛАШТУВАННЯ</h2>
        
        <div class="menu-item hand-drawn-box">
          <label for="volume-slider">ГУЧНІСТЬ</label>
          <input type="range" id="volume-slider" min="0" max="100" value="100">
        </div>
        
        <div class="menu-item">
          <button id="reset-tracks-btn" class="action-btn">РЕСЕТ ТРЕКІВ</button>
        </div>
        
        <div class="menu-item">
          <a href="https://send.monobank.ua/jar/2JbpBYkhMv" target="_blank" class="donate-btn">БЛАГЕ ДІЛО 🤍</a>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="app-container" id="app-container">
      
      <!-- Top / Navigation -->
      <nav class="nav-bar">
        <h1 class="logo-text hand-drawn-box">ЮШКА</h1>
        <div class="nav-actions">
          <button class="info-btn hand-drawn-circle" id="info-btn">*</button>
          <button class="menu-btn hand-drawn-circle" id="menu-btn" aria-label="Menu" style="display:flex; justify-content:center; align-items:center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
        </div>
      </nav>

      <!-- Info Modal (Hidden) -->
      <div class="info-modal hidden" id="info-modal">
        <div class="info-modal-content hand-drawn-box">
          <button class="close-info-btn" id="close-info-btn">X</button>
          <h3>Як крутити:</h3>
          <ul>
            <li><span>1 ТАП</span> = ПАУЗА / ПЛЕЙ</li>
            <li><span>2 ТАПИ</span> = НАСТУПНИЙ</li>
            <li><span>3 ТАПИ</span> = ПОПЕРЕДНІЙ</li>
          </ul>
        </div>
      </div>

      <!-- Vinyl Player Area -->
      <main class="player-wrapper" id="play-trigger">
        <div class="vinyl-container paused" id="vinyl-container">
          <div class="vinyl" id="vinyl">
            <div class="vinyl-grooves"></div>
            <!-- Track Cover will be loaded here -->
            <img src="/yushka-logo.svg" id="track-fallback" class="track-fallback" alt="Logo" />
            <img src="" id="track-cover" class="track-cover hidden" alt="" />
            <div class="vinyl-hole"></div>
          </div>
        </div>
        <div class="spin-instruction" id="spin-instruction">
          <svg viewBox="0 0 300 100" width="100%" height="100%">
            <!-- A nice curve tracing the bottom of the vinyl -->
            <path id="curve-path" d="M 30,20 Q 150,90 270,20" fill="transparent" stroke="#d63031" stroke-width="3" stroke-linecap="round"/>
            <!-- Arrow head at the end -->
            <polygon points="270,20 255,15 260,30" fill="#d63031" transform="rotate(-15 270 20)"/>
            <text font-family="'Neucha', cursive" font-size="24" fill="#d63031" letter-spacing="2">
              <textPath href="#curve-path" startOffset="50%" text-anchor="middle">
                ТАПНИ ЩОБ ЗАКРУТИТИ
              </textPath>
            </text>
          </svg>
        </div>
      </main>

      <!-- Scroll Hint on Mobile -->
      <div class="scroll-hint-mobile">
        ГОРТАЙ ВНИЗ
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <polyline points="19 12 12 19 5 12"></polyline>
        </svg>
      </div>

      <!-- Infinite Mobile Soup Section -->
      <div class="mobile-infinite-scroll" id="mobile-infinite-scroll">
        <!-- JS will populate soups here as you scroll -->
      </div>
      
      <button class="up-btn hidden" id="up-btn" aria-label="Back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>

      <!-- Youtube Iframe Wrapper (Hidden completely but functional) -->
      <!-- Opacity 0.01 prevents the browser from discarding it on mobile -->
      <div class="youtube-embed-container" style="position: absolute; opacity: 0.01; pointer-events: none; z-index: -100; top: 0; left: 0; width: 250px; height: 250px; overflow: hidden;">
        <div id="youtube-player"></div>
      </div>
      
    </div>

    <!-- Load our script -->
    <script type="module" src="/src/main.ts"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
