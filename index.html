<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЮШКА</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!-- Rebellious font for title and standard font for other things -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      
      <!-- Top / Navigation -->
      <nav class="nav-bar">
        <h1 class="logo-text">ЮШКА</h1>
        <button class="menu-btn" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </nav>

      <!-- Vinyl Player Area -->
      <main class="player-wrapper" id="play-trigger">
        <div class="vinyl-container paused" id="vinyl-container">
          <div class="vinyl" id="vinyl">
            <div class="vinyl-grooves"></div>
            <!-- Track Cover will be loaded here -->
            <img src="" id="track-cover" class="track-cover hidden" alt="" />
            <div class="vinyl-hole"></div>
          </div>
        </div>
      </main>

      <!-- Spotify Iframe Wrapper (Hidden completely but functional) -->
      <!-- Opacity 0.01 prevents the browser from discarding it on mobile -->
      <div class="spotify-embed-container">
        <div id="embed-iframe"></div>
      </div>
      
    </div>

    <!-- Load our script -->
    <script type="module" src="/src/main.ts"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  </body>
</html>
